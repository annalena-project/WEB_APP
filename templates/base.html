<!-- base.html – the main layout that all other pages use -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Weather Tracker{% endblock %}</title>
    <style>
        /* ── Page Layout ── */
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

         /* ── Top Navigation Bar ── */
        .header {
            background-color: #1a1a2e;
            color: white;
            padding: 1rem;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* ── Navigation Links ── */
        .header a {
            color: white;
            text-decoration: none;
            margin-left: 1rem;
        }

        /* ── White Content Box ── */
        .content {
            background: white;
            padding: 2rem;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-top: 1rem;
        }

        /* ── Dark Button Style ── */
        .btn {
            background-color: #1a1a2e;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        /* ── Table Style ── */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f5f5f5;
        }

         /* ── Input Fields ── */
        input[type="text"], input[type="number"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <!-- Header / Navigationbar -->
    <div class="header">
        <span>☀️🌧️❄️ Weather Tracker</span>
        <div>
            <a href="/">Home</a>
            <a href="/observations">Observations</a>
        </div>
    </div>

    <!-- Page Content – each page fills this block with its own content -->
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
