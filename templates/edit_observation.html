{% extends "base.html" %}  <!-- Use the main layout (navbar, styling) -->

{% block content %}  <!-- Start of this page content -->

<div class="container mt-5">

    <!-- Page title -->
    <h3>Edit Note</h3>

    <!-- Form to update note -->
    <form method="POST">

        <!-- Input for note -->
        <input type="text" name="note" value="{{ observation[9] }}" placeholder="Add note" class="form-control mb-3">

        <!-- Save button -->
        <button type="submit" class="btn btn-primary">Save</button>

    </form>

    <!-- Back link -->
    <a href="/observations" class="btn btn-secondary mt-3">Back</a>

</div>
